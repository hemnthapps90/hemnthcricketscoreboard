<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hemnthapp Free Software</title>

<link rel="icon" type="image/x-icon" href="https://i.ibb.co/jZqVvZP2/main-logo.png">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Teko:wght@600;700&display=swap" rel="stylesheet">
<!-- CSS File Link -->
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

  <!-- PLAYING 11 OVERLAY -->
  <div class="playing11-overlay" id="playing11">
    <div class="playing11-card" id="playing11Card">
      <div class="playing11-title" id="teamTitle">Team Name - Playing XI</div>
      <div class="players-grid" id="playersGrid"></div>
    </div>
  </div>

  <!-- PLAYER STATS OVERLAY -->
  <div class="stats-overlay" id="statsOverlay">
    <div class="stats-bg-animation">
      <div class="floating-orb"></div><div class="floating-orb"></div><div class="floating-orb"></div><div class="floating-orb"></div>
      <div class="light-beam"></div><div class="light-beam"></div><div class="light-beam"></div><div class="light-beam"></div><div class="light-beam"></div>
      <div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div>
      <div class="rotating-ring"></div><div class="rotating-ring"></div><div class="rotating-ring"></div>
      <div class="hex-pattern"></div>
    </div>
    
    <div class="stats-card" id="statsCard">
      <button class="stats-close" id="statsClose">✕</button>
      <div class="stats-left">
        <div class="stats-player-card">
          <div class="stats-captain-badge" id="statsCaptainBadge">C</div>
          <img src="" class="stats-team-logo" id="statsTeamLogo" alt="Team">
          <div class="stats-player-image">
            <img src="" class="stats-player-head" id="statsPlayerHead" alt="Player">
            <img src="" class="stats-player-body" id="statsPlayerBody" alt="Jersey">
          </div>
          <div class="stats-player-info-box">
            <div class="stats-role-box" id="statsRoleBox">Role</div>
            <div class="stats-name-box" id="statsNameBox">Player Name</div>
            <div class="stats-country-box" id="statsCountryBox">Country</div>
          </div>
        </div>
      </div>
      
      <div class="stats-right">
        <div class="stats-header">
          <div class="stats-player-name" id="statsPlayerName">PLAYER NAME</div>
          <div class="stats-player-role" id="statsPlayerRole">ROLE</div>
        </div>
        <div class="format-tabs" id="formatTabs">
          <div class="format-tab active" data-format="t20">T20</div>
          <div class="format-tab" data-format="odi">ODI</div>
          <div class="format-tab" data-format="test">TEST</div>
        </div>
        <div class="stats-section">
          <div class="stats-section-title">🏏 Batting</div>
          <div class="stats-grid" id="battingStats"></div>
        </div>
        <div class="stats-section">
          <div class="stats-section-title">🎯 Bowling</div>
          <div class="stats-grid" id="bowlingStats"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- INFO OVERLAY FOR WEATHER & TEAM FORM/COMPARISON -->
  <div class="info-overlay" id="infoOverlay">
    <div class="info-card">
      <button class="info-close" id="infoClose">✕</button>
      
      <div class="match-info-header" id="matchInfoHeader"></div>

      <!-- Weather Wrap -->
      <div class="align-center weather-wrap">
        <div>
          <div class="align-center">
            <div class="weather-img" style="margin-right: 16px;">⛅</div>
            <div>
              <div class="weather-place-hum-text" style="padding-bottom: 4px;" id="weatherLocation"></div>
              <div class="weather-temp" id="weatherTemp"></div>
            </div>
          </div>
        </div>
        <div class="weather-right">
          <div class="weather-cloudy-text" style="padding-bottom: 16px;" id="weatherCondition"></div>
          <div class="align-center hum-text-coloum">
            <div class="align-center weather-place-hum-text humidity-text">
              <span style="font-size:24px; margin-right: 6px;">💧</span>
              <div id="weatherHumidity"></div>
            </div>
            <div class="align-center weather-place-hum-text">
              <span style="font-size:24px; margin-right: 6px;">🌧️</span>
              <div id="weatherRain"></div>
            </div>
          </div>
        </div>
      </div> 

      <!-- Venue Stats Wrap -->
      <div class="venue-pace-wrap">
        <div class="flex align-center flex-coloum">
          <div class="pace-text">Pace</div>
          <div class="wicket-count" id="paceWickets"></div>
        </div>
        <div class="flex align-center flex-coloum progress-bar-wrap">
          <div class="progress-bar">
            <div class="progress-pace" id="paceProgress" style="--progress: 50%;"></div>
          </div>
          <div class="flex align-center w100">
            <div class="s-format" id="pacePercText" style="display: flex; flex-grow: 1; opacity: 1;"></div>
            <div class="s-format" id="spinPercText" style="opacity: 1;"></div>
          </div>
        </div>
        <div class="flex align-center flex-coloum">
          <div class="pace-text">Spin</div>
          <div class="wicket-count red-color" id="spinWickets"></div>
        </div>
      </div> 

      <!-- Team Form & Comparison -->
      <div class="content-wrap">
        <div class="team-form">
          <h2 class="title-text"> Team Form & Comparison <span class="last-match-text">(Last 5 matches)</span></h2>
        </div>
        
        <!-- Form Indicators (Generated Dynamically by JS) -->
        <div id="teamFormContainer">
          <div class="format-match">
            <div class="form-match-team">
              <img width="40px" height="40px" class="form-team-img" src="" alt="Team 1">
              <div class="form-team-name">TEAM 1</div>
            </div>
            <div class="flex align-center">
              <div class="d-flex justify-content-center align-item-center"></div>
            </div>
          </div>
          <div class="format-match">
            <div class="form-match-team">
              <img width="40px" height="40px" class="form-team-img" src="" alt="Team 2">
              <div class="form-team-name">TEAM 2</div>
            </div>
            <div class="flex align-center">
              <div class="d-flex justify-content-center align-item-center"></div>
            </div>
          </div>
          
          <!-- H2H & Team Comparison Table -->
          <div class="comparison-grid">
              <!-- Dynamically populated by JS -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- STATIC MAIN DASHBOARD ELEMENTS -->
  <img src="" id="team1flag">
  <img src="" id="team2flag">
    
  <img src="" id="batman1head">
  <img src="" id="batman1body">

  <b id="batman1name"></b>
  <b id="batman1score"></b>

  <div class="batman1sr"></div>

  <img src="" id="batman2head">
  <img src="" id="batman2body">

  <b id="batman2name"></b>
  <b id="batman2score"></b>

  <img src="" id="batman3head">
  <img src="" id="batman3body">

  <b id="bowlername"></b>
  <b id="bowlerscore"></b>

  <b id="pship_label" style="left: 28px; color: #ffff00; text-shadow: #000; font-size: 55px; position: absolute; z-index: 18; top: 296px;">P'SHIP:</b>
  <b id="pship"></b>

  <b id="lastwicket_label" style="left: 380px; color: #ffff00; text-shadow: #000; font-size: 55px; position: absolute; z-index: 18; top: 296px;">Last Wicket:</b>
  <b id="lastwicket"></b>

  <marquee id="status" style="font-weight: 900;"></marquee>

  <div class="top-left-circle" id="leftCircle"></div>
  <div class="top-right-circle" id="rightCircle"></div>

  <div class="top-dotted-bar">
    <div class="slide-bar-left"></div>
    <div class="slide-bar-right"></div>
    <div class="inner-small-rect first"></div>
    <div class="inner-small-rect second"></div>
    <div class="inner-small-rect fourth"></div>
    <div class="inner-small-rect first right"></div>
    <div class="inner-small-rect second right"></div>
    <div class="inner-small-rect fourth right"></div>
    <div class="center-rgb-rect"></div>
    <div class="center-black-rect">

      <p id="livetext"></p>
      <b id="team1nametxt"></b>
      <b id="team1score"></b>
      <b id="team1over"></b>

      <b id="team2nametxt"></b>
      <b id="team2score"></b>
      <b id="team2over"></b>

    </div>
  </div>

  <div class="top-bar-2"></div>

  <div class="bar-large">
    <div class="large-1"></div>
    <div class="large-2"></div>
    <div class="large-3"></div>
  </div>

  <div class="bar-3">
    <div class="part-1" style="text-align:center">
      <span style="color: rgb(255, 230, 0); font-size: 50px; font-weight: 900; text-shadow: 2px 2px 4px rgb(0, 0, 0); margin-left: -100px;">4S:</span>
      <span style="color: rgb(255, 255, 255); font-size: 50px; font-weight: 900; text-shadow: 2px 2px 4px rgb(0, 0, 0); "></span>
      <span style="color: rgb(255, 230, 0); font-size: 50px; font-weight: 900; text-shadow: 2px 2px 4px rgb(0, 0, 0); margin-left: 60px;">6S:</span>
      <span style="color: rgb(255, 255, 255); font-size: 50px; font-weight: 900; text-shadow: 2px 2px 4px rgb(0, 0, 0); "></span>
      <span style="color: rgb(255, 230, 0); font-size: 50px; font-weight: 900; text-shadow: 2px 2px 4px rgb(0, 0, 0); margin-left: 60px;">SR:</span>
      <span style="color: rgb(255, 255, 255); font-size: 50px; font-weight: 900; text-shadow: 2px 2px 4px rgb(0, 0, 0); "></span>
    </div>
    <div class="part-2">
      <span style="color: rgb(255, 230, 0); font-size: 50px; font-weight: 900; text-shadow: 2px 2px 4px rgb(0, 0, 0); margin-left: 15px;">4S:</span>
      <span style="color: rgb(255, 255, 255); font-size: 50px; font-weight: 900; text-shadow: 2px 2px 4px rgb(0, 0, 0); "></span>
      <span style="color: rgb(255, 230, 0); font-size: 50px; font-weight: 900; text-shadow: 2px 2px 4px rgb(0, 0, 0); margin-left: 60px;">6S:</span>
      <span style="color: rgb(255, 255, 255); font-size: 50px; font-weight: 900; text-shadow: 2px 2px 4px rgb(0, 0, 0); "></span>
      <span style="color: rgb(255, 230, 0); font-size: 50px; font-weight: 900; text-shadow: 2px 2px 4px rgb(0, 0, 0); margin-left: 60px;">SR:</span>
      <span style="color: rgb(255, 255, 255); font-size: 50px; font-weight: 900; text-shadow: 2px 2px 4px rgb(0, 0, 0); "></span>
    </div>
    <div class="part-3">
      <span style="color: rgb(255, 230, 0); font-size: 50px; font-weight: 900; text-shadow: 2px 2px 4px rgb(0, 0, 0); margin-left: 15px;">ECON:</span>
      <span style="color: rgb(255, 255, 255); font-size: 50px; font-weight: 900; text-shadow: 2px 2px 4px rgb(0, 0, 0); "></span>
    </div>
  </div>

  <div class="bottom-bar-2"></div>
  <div class="bottom-bar">
    <marquee style="color: rgb(255, 255, 255); font-size: 50px; font-weight: 900; text-shadow: 2px 2px 4px rgb(0, 0, 0); "></marquee>
  </div>

</div>

<!-- JS File Link -->
<script src="script.js"></script>

</body>
</html>
